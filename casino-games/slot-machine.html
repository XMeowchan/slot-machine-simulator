<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mobile-unified.css">
    <title>🎰 老虎机模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.3) 0%, transparent 50%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: bgShift 10s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(20deg); }
        }

        .container {
            background: linear-gradient(145deg, #2d3748 0%, #1a202c 100%);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                0 0 100px rgba(102, 126, 234, 0.2);
            max-width: 600px;
            width: 100%;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.5),
                0 0 20px rgba(255, 215, 0, 0.5);
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 30px rgba(255, 215, 0, 0.8); }
        }

        .subtitle {
            text-align: center;
            color: #a0aec0;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .jackpot-display {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 3px solid #ffd700;
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.3),
                inset 0 2px 10px rgba(255, 215, 0, 0.1);
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .jackpot-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 215, 0, 0.1) 50%,
                transparent 70%
            );
            animation: jackpotShine 3s linear infinite;
        }

        @keyframes jackpotShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .jackpot-label {
            color: #ffd700;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .jackpot-amount {
            color: #fff;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.5),
                0 0 20px rgba(255, 215, 0, 0.6);
            animation: jackpotPulse 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes jackpotPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .multiplier-display {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .multiplier-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .multiplier-value {
            color: #fff;
            font-size: 1.8em;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .multiplier-value.active {
            animation: multiplierGlow 0.5s ease-in-out;
        }

        @keyframes multiplierGlow {
            0%, 100% { transform: scale(1); text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
            50% { transform: scale(1.2); text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        }

        .stat-box {
            background: #1a202c;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: #a0aec0;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 1.5em;
            font-weight: bold;
        }

        .stat-value.positive {
            color: #48bb78;
        }

        .stat-value.negative {
            color: #f56565;
        }

        .reels {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            perspective: 1000px;
        }

        .reel-container {
            background: linear-gradient(180deg, #1a202c 0%, #2d3748 50%, #1a202c 100%);
            border: 4px solid #ffd700;
            border-radius: 15px;
            width: 120px;
            height: 140px;
            box-shadow: 
                inset 0 4px 8px rgba(0,0,0,0.3),
                0 0 20px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .reel-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 2;
            pointer-events: none;
        }

        .reel-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            z-index: 2;
            pointer-events: none;
        }

        .reel {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 4em;
            transition: transform 0.1s linear;
        }

        .reel-symbol {
            height: 140px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-shrink: 0;
        }

        .reel.spinning {
            animation: reelSpin 0.1s linear infinite;
        }

        .reel-container.stopping {
            animation: shake 0.3s ease-out;
        }

        .reel-container.win {
            animation: winFlash 0.6s ease-in-out 4;
            border-color: #48bb78;
        }

        .reel-container.jackpot {
            animation: jackpotFlash 0.4s ease-in-out 6;
            border-color: #ffd700;
        }

        @keyframes reelSpin {
            0% { transform: translateY(0); }
            100% { transform: translateY(-140px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-8px); }
            75% { transform: translateY(4px); }
        }

        @keyframes winFlash {
            0%, 100% { 
                box-shadow: 
                    inset 0 4px 8px rgba(0,0,0,0.3),
                    0 0 20px rgba(72, 187, 120, 0.3);
            }
            50% { 
                box-shadow: 
                    inset 0 4px 8px rgba(0,0,0,0.3),
                    0 0 40px rgba(72, 187, 120, 1),
                    0 0 60px rgba(72, 187, 120, 0.6);
                transform: scale(1.05);
            }
        }

        @keyframes jackpotFlash {
            0%, 100% { 
                box-shadow: 
                    inset 0 4px 8px rgba(0,0,0,0.3),
                    0 0 20px rgba(255, 215, 0, 0.3);
            }
            50% { 
                box-shadow: 
                    inset 0 4px 8px rgba(0,0,0,0.3),
                    0 0 50px rgba(255, 215, 0, 1),
                    0 0 80px rgba(255, 215, 0, 0.8),
                    0 0 100px rgba(255, 215, 0, 0.4);
                transform: scale(1.08);
            }
        }

        /* 全屏闪光效果 */
        @keyframes screenFlash {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.3; }
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.8) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            z-index: 9999;
        }

        .flash-overlay.active {
            animation: screenFlash 0.5s ease-out 3;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .bet-control {
            flex: 1;
            background: #1a202c;
            padding: 15px;
            border-radius: 10px;
        }

        .bet-control label {
            color: #a0aec0;
            font-size: 0.9em;
            display: block;
            margin-bottom: 8px;
        }

        .bet-buttons {
            display: flex;
            gap: 8px;
        }

        .bet-btn {
            flex: 1;
            padding: 8px;
            background: #4a5568;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .bet-btn:hover {
            background: #718096;
        }

        .bet-btn.active {
            background: #667eea;
        }

        .spin-button {
            width: 100%;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .spin-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(245, 87, 108, 0.6);
        }

        .spin-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .spin-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2em;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.win {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 2px solid #48bb78;
        }

        .message.lose {
            background: rgba(245, 101, 101, 0.2);
            color: #f56565;
            border: 2px solid #f56565;
        }

        .message.jackpot {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 2px solid #ffd700;
            animation: pulse 1s infinite;
        }

        .message.near-miss {
            background: rgba(237, 137, 54, 0.2);
            color: #ed8936;
            border: 2px solid #ed8936;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .paytable {
            background: #1a202c;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .paytable h3 {
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
        }

        .paytable-row {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            color: #a0aec0;
            border-bottom: 1px solid #2d3748;
        }

        .paytable-row:last-child {
            border-bottom: none;
        }

        .paytable-combo {
            font-size: 1.2em;
        }

        .reset-button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #4a5568;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }

        .reset-button:hover {
            background: #718096;
        }

        .back-button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
    <script src="global-balance.js"></script>
</head>
<body>
    <div class="container">

    <script>
        class SlotGame {
            constructor() {
                this.symbols = {
                    '💎': { weight: 1 },
                    '7️⃣': { weight: 8 },
                    '⭐': { weight: 15 },
                    '🍊': { weight: 25 },
                    '🍋': { weight: 30 },
                    '🍒': { weight: 35 },
                    '🎲': { weight: 142 }
                };

                this.payouts = {
                    '💎💎💎': 1000,
                    '7️⃣7️⃣7️⃣': 100,
                    '⭐⭐⭐': 40,
                    '🍊🍊🍊': 25,
                    '🍋🍋🍋': 15,
                    '🍒🍒🍒': 10,
                    '🍒🍒': 5,
                    '🍒': 2
                };

                this.totalWeight = Object.values(this.symbols).reduce((sum, s) => sum + s.weight, 0);
                
                // 使用全局余额
                this.balance = window.globalBalance.getBalance();
                this.currentBet = 20;
                this.totalSpins = 0;
                this.totalBet = 0;
                this.totalWin = 0;
                this.isSpinning = false;
                
                // 新增玩法
                this.jackpot = 10000; // 累进奖池
                this.winStreak = 0; // 连胜次数
                this.multiplier = 1; // 当前倍数
                
                // 音效系统
                this.audioContext = null;
                this.soundEnabled = true;
                
                // 加载存档
                this.loadGame();

                this.initElements();
                this.initEventListeners();
                this.updateDisplay();
            }

            // 初始化音频上下文（用户首次交互后）
            initAudio() {
                if (!this.audioContext && this.soundEnabled) {
                    try {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('音频不可用:', e);
                        this.soundEnabled = false;
                    }
                }
            }

            // 播放音效（使用 Web Audio API 合成）
            playSound(type) {
                if (!this.soundEnabled || !this.audioContext) return;
                
                try {
                    const ctx = this.audioContext;
                    const now = ctx.currentTime;
                    
                    switch(type) {
                        case 'spin':
                            // 旋转音效：机械旋转的嗡嗡声 + 金属摩擦感
                            this.playSpinSound(ctx, now);
                            break;
                            
                        case 'stop':
                            // 停止音效：机械咔哒声 + 金属碰撞
                            this.playStopSound(ctx, now);
                            break;
                            
                        case 'win':
                            // 小奖音效：清脆的硬币叮当声 + 欢快旋律
                            this.playCoinSound(ctx, now, 3);
                            this.playWinMelody(ctx, now);
                            break;
                            
                        case 'bigwin':
                            // 大奖音效：更多硬币 + 更华丽的旋律
                            this.playCoinSound(ctx, now, 8);
                            this.playBigWinMelody(ctx, now);
                            break;
                            
                        case 'jackpot':
                            // 超级大奖：疯狂的硬币雨 + 胜利号角
                            this.playCoinRain(ctx, now);
                            this.playJackpotFanfare(ctx, now);
                            this.playVictoryChord(ctx, now + 0.5);
                            break;
                            
                        case 'lose':
                            // 失败音效：低沉的叹息声
                            this.playLoseSound(ctx, now);
                            break;
                            
                        case 'nearmiss':
                            // Near-miss：紧张的鼓点 + 上升音调
                            this.playNearMissSound(ctx, now);
                            break;
                    }
                } catch (e) {
                    console.warn('播放音效失败:', e);
                }
            }

            // 旋转音效：模拟机械旋转
            playSpinSound(ctx, startTime) {
                // 低频嗡嗡声
                const bass = ctx.createOscillator();
                const bassGain = ctx.createGain();
                bass.connect(bassGain);
                bassGain.connect(ctx.destination);
                bass.type = 'sawtooth';
                bass.frequency.setValueAtTime(80, startTime);
                bass.frequency.exponentialRampToValueAtTime(120, startTime + 0.3);
                bassGain.gain.setValueAtTime(0.2, startTime);
                bassGain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
                bass.start(startTime);
                bass.stop(startTime + 0.3);

                // 高频摩擦声
                const noise = ctx.createOscillator();
                const noiseGain = ctx.createGain();
                noise.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.type = 'square';
                noise.frequency.setValueAtTime(1200, startTime);
                noise.frequency.exponentialRampToValueAtTime(1800, startTime + 0.2);
                noiseGain.gain.setValueAtTime(0.08, startTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);
                noise.start(startTime);
                noise.stop(startTime + 0.2);
            }

            // 停止音效：机械咔哒声
            playStopSound(ctx, startTime) {
                // 低频撞击
                const impact = ctx.createOscillator();
                const impactGain = ctx.createGain();
                impact.connect(impactGain);
                impactGain.connect(ctx.destination);
                impact.type = 'sine';
                impact.frequency.setValueAtTime(100, startTime);
                impact.frequency.exponentialRampToValueAtTime(50, startTime + 0.1);
                impactGain.gain.setValueAtTime(0.3, startTime);
                impactGain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.1);
                impact.start(startTime);
                impact.stop(startTime + 0.1);

                // 高频咔哒
                const click = ctx.createOscillator();
                const clickGain = ctx.createGain();
                click.connect(clickGain);
                clickGain.connect(ctx.destination);
                click.type = 'square';
                click.frequency.value = 2000;
                clickGain.gain.setValueAtTime(0.15, startTime);
                clickGain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.05);
                click.start(startTime);
                click.stop(startTime + 0.05);
            }

            // 硬币叮当声
            playCoinSound(ctx, startTime, count) {
                for (let i = 0; i < count; i++) {
                    const delay = i * 0.08;
                    const coin = ctx.createOscillator();
                    const coinGain = ctx.createGain();
                    coin.connect(coinGain);
                    coinGain.connect(ctx.destination);
                    coin.type = 'sine';
                    
                    // 硬币的金属音
                    const freq = 1800 + Math.random() * 400;
                    coin.frequency.setValueAtTime(freq, startTime + delay);
                    coin.frequency.exponentialRampToValueAtTime(freq * 0.7, startTime + delay + 0.1);
                    
                    coinGain.gain.setValueAtTime(0.2, startTime + delay);
                    coinGain.gain.exponentialRampToValueAtTime(0.01, startTime + delay + 0.15);
                    
                    coin.start(startTime + delay);
                    coin.stop(startTime + delay + 0.15);
                }
            }

            // 硬币雨（大奖）
            playCoinRain(ctx, startTime) {
                for (let i = 0; i < 20; i++) {
                    const delay = i * 0.05;
                    const coin = ctx.createOscillator();
                    const coinGain = ctx.createGain();
                    coin.connect(coinGain);
                    coinGain.connect(ctx.destination);
                    coin.type = 'sine';
                    
                    const freq = 1600 + Math.random() * 800;
                    coin.frequency.setValueAtTime(freq, startTime + delay);
                    coin.frequency.exponentialRampToValueAtTime(freq * 0.6, startTime + delay + 0.12);
                    
                    coinGain.gain.setValueAtTime(0.15, startTime + delay);
                    coinGain.gain.exponentialRampToValueAtTime(0.01, startTime + delay + 0.12);
                    
                    coin.start(startTime + delay);
                    coin.stop(startTime + delay + 0.12);
                }
            }

            // 小奖旋律
            playWinMelody(ctx, startTime) {
                const melody = [523.25, 659.25, 783.99]; // C5, E5, G5
                melody.forEach((freq, i) => {
                    this.playNote(ctx, freq, 0.15, startTime + i * 0.12, 0.25);
                });
            }

            // 大奖旋律
            playBigWinMelody(ctx, startTime) {
                const melody = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                melody.forEach((freq, i) => {
                    this.playNote(ctx, freq, 0.2, startTime + i * 0.1, 0.3);
                    // 和声
                    this.playNote(ctx, freq * 1.5, 0.15, startTime + i * 0.1 + 0.02, 0.2);
                });
            }

            // 超级大奖号角
            playJackpotFanfare(ctx, startTime) {
                const fanfare = [
                    [523.25, 659.25, 783.99], // C大三和弦
                    [587.33, 739.99, 880.00], // D大三和弦
                    [659.25, 830.61, 987.77], // E大三和弦
                    [783.99, 987.77, 1174.66] // G大三和弦
                ];
                
                fanfare.forEach((chord, i) => {
                    chord.forEach(freq => {
                        this.playNote(ctx, freq, 0.25, startTime + i * 0.15, 0.35);
                    });
                });
            }

            // 胜利和弦
            playVictoryChord(ctx, startTime) {
                const chord = [523.25, 659.25, 783.99, 1046.50]; // C大和弦
                chord.forEach(freq => {
                    this.playNote(ctx, freq, 0.5, startTime, 0.4);
                });
            }

            // 失败音效
            playLoseSound(ctx, startTime) {
                const descend = [392, 349.23, 293.66]; // G4, F4, D4
                descend.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, startTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, startTime + i * 0.15 + 0.2);
                    osc.start(startTime + i * 0.15);
                    osc.stop(startTime + i * 0.15 + 0.2);
                });
            }

            // Near-miss 音效
            playNearMissSound(ctx, startTime) {
                // 紧张的鼓点
                for (let i = 0; i < 3; i++) {
                    const drum = ctx.createOscillator();
                    const drumGain = ctx.createGain();
                    drum.connect(drumGain);
                    drumGain.connect(ctx.destination);
                    drum.type = 'sine';
                    drum.frequency.setValueAtTime(80, startTime + i * 0.1);
                    drum.frequency.exponentialRampToValueAtTime(40, startTime + i * 0.1 + 0.05);
                    drumGain.gain.setValueAtTime(0.3, startTime + i * 0.1);
                    drumGain.gain.exponentialRampToValueAtTime(0.01, startTime + i * 0.1 + 0.05);
                    drum.start(startTime + i * 0.1);
                    drum.stop(startTime + i * 0.1 + 0.05);
                }
                
                // 上升音调
                const rise = ctx.createOscillator();
                const riseGain = ctx.createGain();
                rise.connect(riseGain);
                riseGain.connect(ctx.destination);
                rise.type = 'sawtooth';
                rise.frequency.setValueAtTime(200, startTime);
                rise.frequency.exponentialRampToValueAtTime(600, startTime + 0.3);
                riseGain.gain.setValueAtTime(0.15, startTime);
                riseGain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);
                rise.start(startTime);
                rise.stop(startTime + 0.3);
            }

            // 播放单个音符
            playNote(ctx, frequency, duration, startTime, volume = 0.25) {
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                
                // 音量包络（ADSR）
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(volume, startTime + 0.02); // Attack
                gainNode.gain.linearRampToValueAtTime(volume * 0.7, startTime + 0.05); // Decay
                gainNode.gain.setValueAtTime(volume * 0.7, startTime + duration * 0.7); // Sustain
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration); // Release
                
                oscillator.start(startTime);
                oscillator.stop(startTime + duration);
            }

            // 保存游戏
            saveGame() {
                const saveData = {
                    balance: this.balance,
                    totalSpins: this.totalSpins,
                    totalBet: this.totalBet,
                    totalWin: this.totalWin,
                    jackpot: this.jackpot,
                    winStreak: this.winStreak,
                    multiplier: this.multiplier,
                    currentBet: this.currentBet,
                    timestamp: Date.now()
                };
                localStorage.setItem('slotMachineGame', JSON.stringify(saveData));
            }

            // 加载游戏
            loadGame() {
                try {
                    const saved = localStorage.getItem('slotMachineGame');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.balance = data.balance || 1000;
                        this.totalSpins = data.totalSpins || 0;
                        this.totalBet = data.totalBet || 0;
                        this.totalWin = data.totalWin || 0;
                        this.jackpot = data.jackpot || 10000;
                        this.winStreak = data.winStreak || 0;
                        this.multiplier = data.multiplier || 1;
                        this.currentBet = data.currentBet || 20;
                    }
                } catch (e) {
                    console.error('加载存档失败:', e);
                }
            }

            // 清除存档
            clearSave() {
                localStorage.removeItem('slotMachineGame');
            }

            initElements() {
                this.balanceEl = document.getElementById('balance');
                this.spinsEl = document.getElementById('spins');
                this.rtpEl = document.getElementById('rtp');
                this.jackpotEl = document.getElementById('jackpot');
                this.multiplierEl = document.getElementById('multiplier');
                this.winStreakEl = document.getElementById('winStreak');
                this.reel1 = document.getElementById('reel1');
                this.reel2 = document.getElementById('reel2');
                this.reel3 = document.getElementById('reel3');
                this.reelContainer1 = document.getElementById('reelContainer1');
                this.reelContainer2 = document.getElementById('reelContainer2');
                this.reelContainer3 = document.getElementById('reelContainer3');
                this.spinBtn = document.getElementById('spinBtn');
                this.messageEl = document.getElementById('message');
                this.resetBtn = document.getElementById('resetBtn');
                this.flashOverlay = document.getElementById('flashOverlay');
            }

            initEventListeners() {
                this.spinBtn.addEventListener('click', () => this.spin());
                this.resetBtn.addEventListener('click', () => this.reset());

                document.querySelectorAll('.bet-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentBet = parseInt(e.target.dataset.bet);
                        this.spinBtn.textContent = `💰 立刻捡钱 (¥${this.currentBet})`;
                    });
                });
            }

            spinReel() {
                const random = Math.floor(Math.random() * this.totalWeight);
                let cumulative = 0;
                
                for (const [symbol, data] of Object.entries(this.symbols)) {
                    cumulative += data.weight;
                    if (random < cumulative) {
                        return symbol;
                    }
                }
                return '🎲';
            }

            calculatePayout(reels) {
                const key = reels.join('');
                
                if (this.payouts[key]) {
                    return { amount: this.payouts[key], type: key };
                }
                
                const cherryCount = reels.filter(r => r === '🍒').length;
                if (cherryCount === 2) {
                    return { amount: this.payouts['🍒🍒'], type: '🍒🍒' };
                }
                if (cherryCount === 1) {
                    return { amount: this.payouts['🍒'], type: '🍒' };
                }
                
                return { amount: 0, type: 'loss' };
            }

            checkNearMiss(reels) {
                const highValue = ['💎', '7️⃣', '⭐'];
                return highValue.includes(reels[0]) && reels[0] === reels[1] && reels[0] !== reels[2];
            }

            async spin() {
                if (this.isSpinning || this.balance < this.currentBet) {
                    if (this.balance < this.currentBet) {
                        this.showMessage('余额不足！', 'lose');
                        this.playSound('lose');
                    }
                    return;
                }

                // 首次点击时初始化音频
                this.initAudio();

                this.isSpinning = true;
                this.spinBtn.disabled = true;
                this.messageEl.textContent = '';
                this.messageEl.className = 'message';

                // 扣除下注
                window.globalBalance.subtractBalance(this.currentBet);
                this.balance = window.globalBalance.getBalance();
                this.totalBet += this.currentBet;
                this.totalSpins++;
                
                // 累进奖池增长（每次下注的2%进入奖池）
                const jackpotContribution = Math.floor(this.currentBet * 0.02);
                this.jackpot += jackpotContribution;

                // 播放旋转音效
                this.playSound('spin');

                // 动画效果
                [this.reel1, this.reel2, this.reel3].forEach(reel => {
                    reel.classList.add('spinning');
                });

                // 生成结果
                const reels = [this.spinReel(), this.spinReel(), this.spinReel()];

                // 模拟旋转延迟
                await this.animateReels(reels);

                // 停止动画
                [this.reel1, this.reel2, this.reel3].forEach(reel => {
                    reel.classList.remove('spinning');
                });

                // 计算结果
                const payout = this.calculatePayout(reels);
                let winAmount = payout.amount * this.currentBet;
                
                // 检查是否中累进奖池（三个💎）
                let jackpotWin = false;
                if (reels[0] === '💎' && reels[1] === '💎' && reels[2] === '💎') {
                    jackpotWin = true;
                    winAmount += this.jackpot;
                    this.jackpot = 10000; // 重置奖池
                }
                
                // 应用连胜倍数
                if (payout.amount > 0) {
                    winAmount = Math.floor(winAmount * this.multiplier);
                    this.winStreak++;
                    // 连胜倍数增长：每连胜一次，倍数+0.1，最高3倍
                    this.multiplier = Math.min(3, 1 + this.winStreak * 0.1);
                    this.multiplierEl.classList.add('active');
                    setTimeout(() => this.multiplierEl.classList.remove('active'), 500);
                } else {
                    // 输了就重置连胜
                    this.winStreak = 0;
                    this.multiplier = 1;
                }
                
                this.totalWin += winAmount;
                window.globalBalance.addBalance(winAmount);
                this.balance = window.globalBalance.getBalance();

                // 显示消息
                this.showResult(reels, payout, winAmount, jackpotWin);

                this.updateDisplay();
                this.isSpinning = false;
                this.spinBtn.disabled = false;
                
                // 自动保存
                this.saveGame();

                // 检查破产
                if (this.balance < 10) {
                    setTimeout(() => {
                        alert(`游戏结束！\n\n总旋转: ${this.totalSpins} 次\n总投注: ¥${this.totalBet}\n总赢得: ¥${this.totalWin}\n实际RTP: ${this.getRTP()}%\n\n点击重置开始新游戏`);
                    }, 1000);
                }
            }

            async animateReels(finalReels) {
                const allSymbols = Object.keys(this.symbols);
                const reelElements = [this.reel1, this.reel2, this.reel3];
                const containerElements = [this.reelContainer1, this.reelContainer2, this.reelContainer3];
                const spinDurations = [1200, 1800, 2400]; // 依次停下

                // 开始所有转轮旋转
                for (let i = 0; i < 3; i++) {
                    const reel = reelElements[i];
                    const container = containerElements[i];
                    const duration = spinDurations[i];
                    
                    reel.classList.add('spinning');
                    
                    // 快速滚动动画 - 更新所有符号
                    const interval = setInterval(() => {
                        const symbols = reel.querySelectorAll('.reel-symbol');
                        symbols.forEach(symbol => {
                            symbol.textContent = allSymbols[Math.floor(Math.random() * allSymbols.length)];
                        });
                    }, 50);

                    // 等待指定时间后停止
                    await new Promise(resolve => setTimeout(resolve, duration));
                    clearInterval(interval);
                    
                    // 播放停止音效
                    this.playSound('stop');
                    
                    // 停止动画
                    reel.classList.remove('spinning');
                    container.classList.add('stopping');
                    
                    // 显示最终结果（设置第一个符号为结果）
                    const symbols = reel.querySelectorAll('.reel-symbol');
                    symbols[0].textContent = finalReels[i];
                    
                    // 重置位置
                    reel.style.transform = 'translateY(0)';
                    
                    await new Promise(resolve => setTimeout(resolve, 300));
                    container.classList.remove('stopping');
                }
            }

            showResult(reels, payout, winAmount, jackpotWin) {
                const containerElements = [this.reelContainer1, this.reelContainer2, this.reelContainer3];
                
                if (jackpotWin) {
                    // 累进奖池大奖！
                    this.playSound('jackpot');
                    this.flashOverlay.classList.add('active');
                    setTimeout(() => {
                        this.flashOverlay.classList.remove('active');
                    }, 2000);
                    
                    containerElements.forEach(container => container.classList.add('jackpot'));
                    setTimeout(() => {
                        containerElements.forEach(container => container.classList.remove('jackpot'));
                    }, 3000);
                    
                    this.showMessage(`💰💰💰 JACKPOT！赢得累进奖池 ¥${winAmount}！💰💰💰`, 'jackpot');
                } else if (payout.amount >= 100) {
                    // 超级大奖特效 - 全屏闪光
                    this.playSound('jackpot');
                    this.flashOverlay.classList.add('active');
                    setTimeout(() => {
                        this.flashOverlay.classList.remove('active');
                    }, 1500);
                    
                    containerElements.forEach(container => container.classList.add('jackpot'));
                    setTimeout(() => {
                        containerElements.forEach(container => container.classList.remove('jackpot'));
                    }, 2400);
                    
                    const multiplierText = this.multiplier > 1 ? ` (×${this.multiplier.toFixed(1)} 倍数加成)` : '';
                    this.showMessage(`🎉🎉🎉 超级大奖！赢得 ¥${winAmount}${multiplierText}！🎉🎉🎉`, 'jackpot');
                } else if (payout.amount >= 10) {
                    // 大奖特效
                    this.playSound('bigwin');
                    containerElements.forEach(container => container.classList.add('jackpot'));
                    setTimeout(() => {
                        containerElements.forEach(container => container.classList.remove('jackpot'));
                    }, 2400);
                    
                    const multiplierText = this.multiplier > 1 ? ` (×${this.multiplier.toFixed(1)})` : '';
                    this.showMessage(`🎊 大奖 ${payout.amount}x！赢得 ¥${winAmount}${multiplierText}`, 'jackpot');
                } else if (payout.amount > 0) {
                    // 小奖特效
                    this.playSound('win');
                    containerElements.forEach(container => container.classList.add('win'));
                    setTimeout(() => {
                        containerElements.forEach(container => container.classList.remove('win'));
                    }, 2400);
                    
                    const streakText = this.winStreak > 1 ? ` 🔥 连胜${this.winStreak}次！` : '';
                    const multiplierText = this.multiplier > 1 ? ` (×${this.multiplier.toFixed(1)})` : '';
                    this.showMessage(`✅ 中奖 ${payout.amount}x！赢得 ¥${winAmount}${multiplierText}${streakText}`, 'win');
                } else if (this.checkNearMiss(reels)) {
                    this.playSound('nearmiss');
                    this.showMessage(`🔥 差一点就中了！继续加油！`, 'near-miss');
                } else {
                    this.playSound('lose');
                    this.showMessage(`❌ 未中奖 - 连胜中断`, 'lose');
                }
            }

            showMessage(text, type) {
                this.messageEl.textContent = text;
                this.messageEl.className = `message ${type}`;
            }

            getRTP() {
                return this.totalBet > 0 ? ((this.totalWin / this.totalBet) * 100).toFixed(1) : '--';
            }

            updateDisplay() {
                this.balanceEl.textContent = `¥${this.balance}`;
                this.balanceEl.className = 'stat-value';
                if (this.balance > 1000) {
                    this.balanceEl.classList.add('positive');
                } else if (this.balance < 1000) {
                    this.balanceEl.classList.add('negative');
                }

                this.spinsEl.textContent = this.totalSpins;
                this.rtpEl.textContent = this.getRTP() + '%';
                this.jackpotEl.textContent = `¥${this.jackpot.toLocaleString()}`;
                this.multiplierEl.textContent = `×${this.multiplier.toFixed(1)}`;
                this.winStreakEl.textContent = this.winStreak;
            }

            reset() {
                if (confirm('确定要重置游戏吗？（余额不会重置，请在主页重置）')) {
                    this.totalSpins = 0;
                    this.totalBet = 0;
                    this.totalWin = 0;
                    this.jackpot = 10000;
                    this.winStreak = 0;
                    this.multiplier = 1;
                    this.currentBet = 20;
                    
                    // 清除存档
                    this.clearSave();
                    
                    // 重置转轮显示
                    [this.reel1, this.reel2, this.reel3].forEach(reel => {
                        const symbols = reel.querySelectorAll('.reel-symbol');
                        symbols[0].textContent = '🍒';
                        reel.style.transform = 'translateY(0)';
                    });
                    
                    this.messageEl.textContent = '';
                    this.messageEl.className = 'message';
                    this.updateDisplay();
                }
            }
        }

        // 启动游戏
        const game = new SlotGame();
    </script>
</body>
</html>
